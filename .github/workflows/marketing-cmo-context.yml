name: Generate marketing CMO context

on:
  workflow_dispatch:
    inputs:
      period_key:
        description: Target campaign period in YYYY-MM format
        required: true
        type: string
      force:
        description: Rebuild the context even when it already exists
        required: false
        default: true
        type: boolean
  schedule:
    - cron: '15 6 1 * *'

permissions:
  contents: write

concurrency:
  group: marketing-cycle-${{ github.event.inputs.period_key || github.event.schedule || 'scheduled' }}
  cancel-in-progress: false

jobs:
  generate-context:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    env:
      DATABASE_URL: ${{ secrets.DATABASE_URL }}

    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24

      - name: Resolve target period
        id: period
        shell: bash
        env:
          MANUAL_PERIOD: ${{ github.event.inputs.period_key }}
        run: |
          set -euo pipefail

          if [[ "${GITHUB_EVENT_NAME}" == "workflow_dispatch" ]]; then
            period_key="${MANUAL_PERIOD}"
          else
            period_key="$(TZ=Europe/Madrid date +%Y-%m)"
          fi

          node -e '
            const value = process.argv[1];
            const match = /^(\d{4})-(\d{2})$/.exec(value);
            if (!match || Number(match[2]) < 1 || Number(match[2]) > 12) {
              console.error("period_key must be a valid YYYY-MM value");
              process.exit(1);
            }
          ' "${period_key}"

          previous_period="$(node -e '
            const [year, month] = process.argv[1].split("-").map(Number);
            const date = new Date(Date.UTC(year, month - 2, 1));
            process.stdout.write(`${date.getUTCFullYear()}-${String(date.getUTCMonth() + 1).padStart(2, "0")}`);
          ' "${period_key}")"

          echo "period_key=${period_key}" >> "${GITHUB_OUTPUT}"
          echo "previous_period=${previous_period}" >> "${GITHUB_OUTPUT}"
          echo "branch=automation/marketing-cycle-${period_key}" >> "${GITHUB_OUTPUT}"
          echo "output_path=marketing/agent-inputs/${period_key}/cmo-context.json" >> "${GITHUB_OUTPUT}"

      - name: Prepare monthly cycle branch
        shell: bash
        env:
          CYCLE_BRANCH: ${{ steps.period.outputs.branch }}
        run: |
          set -euo pipefail
          git fetch origin main --prune

          if git ls-remote --exit-code --heads origin "${CYCLE_BRANCH}" >/dev/null 2>&1; then
            git fetch origin "${CYCLE_BRANCH}:${CYCLE_BRANCH}"
            git checkout "${CYCLE_BRANCH}"
            git merge --no-edit origin/main
          else
            git checkout -b "${CYCLE_BRANCH}" origin/main
          fi

      - name: Check required configuration
        shell: bash
        run: |
          set -euo pipefail
          if [[ -z "${DATABASE_URL:-}" ]]; then
            echo "The repository secret DATABASE_URL is required." >&2
            exit 1
          fi

      - name: Install dependencies
        run: npm install --no-audit --no-fund

      - name: Typecheck API
        run: npm -w @innerbloom/api run typecheck

      - name: Test CMO context exporter
        run: >-
          npm -w @innerbloom/api exec vitest run
          src/services/marketingAnalyticsService.test.ts
          src/services/marketingCmoContextService.test.ts
          src/modules/admin/admin.cmo-context.routes.test.ts

      - name: Generate CMO context
        shell: bash
        env:
          PERIOD_KEY: ${{ steps.period.outputs.period_key }}
          FORCE_INPUT: ${{ github.event.inputs.force }}
        run: |
          set -euo pipefail
          args=(--period="${PERIOD_KEY}")
          if [[ "${GITHUB_EVENT_NAME}" == "schedule" || "${FORCE_INPUT:-true}" == "true" ]]; then
            args+=(--force)
          fi
          npx tsx apps/api/scripts/export-marketing-cmo-context.ts "${args[@]}"

      - name: Verify and validate generated JSON
        shell: bash
        env:
          OUTPUT_PATH: ${{ steps.period.outputs.output_path }}
        run: |
          set -euo pipefail
          test -s "${OUTPUT_PATH}"
          git diff --check -- "${OUTPUT_PATH}"
          npx tsx apps/api/scripts/validate-marketing-agent-json.ts \
            --schema=prompts/marketing/agent-system/schemas/cmo-input-v1.schema.json \
            --input="${OUTPUT_PATH}"

      - name: Commit and push monthly branch
        shell: bash
        env:
          PERIOD_KEY: ${{ steps.period.outputs.period_key }}
          CYCLE_BRANCH: ${{ steps.period.outputs.branch }}
          OUTPUT_PATH: ${{ steps.period.outputs.output_path }}
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -- "${OUTPUT_PATH}"

          if git diff --cached --quiet; then
            echo "The validated context is unchanged; no commit is required."
          else
            git commit -m "chore(marketing): generate CMO context for ${PERIOD_KEY}"
          fi

          git push --set-upstream origin "${CYCLE_BRANCH}"

      - name: Upload generated context artifact
        uses: actions/upload-artifact@v4
        with:
          name: marketing-cmo-context-${{ steps.period.outputs.period_key }}
          path: ${{ steps.period.outputs.output_path }}
          if-no-files-found: error
          retention-days: 30

      - name: Report next step
        shell: bash
        env:
          PERIOD_KEY: ${{ steps.period.outputs.period_key }}
          PREVIOUS_PERIOD: ${{ steps.period.outputs.previous_period }}
          CYCLE_BRANCH: ${{ steps.period.outputs.branch }}
          OUTPUT_PATH: ${{ steps.period.outputs.output_path }}
        run: |
          {
            echo "## CMO context ready"
            echo "- Target period: \`${PERIOD_KEY}\`"
            echo "- Analysed period: \`${PREVIOUS_PERIOD}\`"
            echo "- Branch: \`${CYCLE_BRANCH}\`"
            echo "- Input: \`${OUTPUT_PATH}\`"
            echo "- Validation: passed"
            echo "- Pull request: not opened"
            echo "- Next step: run the CMO agent on the same branch"
          } >> "${GITHUB_STEP_SUMMARY}"
