name: Render campaign and send it to Admin

on:
  workflow_dispatch:
    inputs:
      period_key:
        description: Target campaign period in YYYY-MM format
        required: true
        type: string
      preview_limit:
        description: Render only the first N image jobs and do not import to Admin (0 renders the full campaign)
        required: false
        default: "5"
        type: string

permissions:
  contents: write

concurrency:
  group: marketing-render-${{ inputs.period_key }}
  cancel-in-progress: false

jobs:
  render-and-import:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    env:
      DATABASE_URL: ${{ secrets.DATABASE_URL }}
      GOOGLE_SERVICE_ACCOUNT_JSON: ${{ secrets.GOOGLE_SERVICE_ACCOUNT_JSON }}

    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.ref_name }}
          fetch-depth: 1

      - uses: actions/setup-node@v4
        with:
          node-version: 24

      - name: Check configuration
        run: |
          set -euo pipefail
          for key in DATABASE_URL GOOGLE_SERVICE_ACCOUNT_JSON; do
            if [[ -z "${!key:-}" ]]; then
              echo "Missing required GitHub secret: ${key}" >&2
              exit 1
            fi
          done

      - name: Install dependencies
        run: npm install --no-audit --no-fund

      - name: Install Chromium for the deterministic renderer
        run: npm -w @innerbloom/web exec playwright install --with-deps chromium

      - name: Choose isolated render output
        shell: bash
        run: |
          if [[ "${{ inputs.preview_limit }}" == "0" ]]; then
            echo "RENDER_OUTPUT_DIR=marketing/generated/${{ inputs.period_key }}/rendered" >> "${GITHUB_ENV}"
          else
            echo "RENDER_OUTPUT_DIR=marketing/generated/${{ inputs.period_key }}/renderer-v3-pilot" >> "${GITHUB_ENV}"
          fi

      - name: Validate creative contract
        run: node scripts/marketing/validate-creative-direction-v3.mjs marketing/agent-outputs/${{ inputs.period_key }}/campaign.json

      - name: Stage approved source assets from Drive
        run: >-
          npm -w @innerbloom/api exec tsx scripts/stage-marketing-drive-assets.ts
          ../../marketing/agent-outputs/${{ inputs.period_key }}/campaign.json
          ../../marketing/asset-registry/innerbloom-drive-assets-v1.json
          ../../marketing/generated/${{ inputs.period_key }}/source-assets

      - name: Render deterministic campaign PNGs
        run: >-
          node scripts/marketing/render-campaign-v3.mjs
          marketing/agent-outputs/${{ inputs.period_key }}/campaign.json
          --asset-dir marketing/generated/${{ inputs.period_key }}/source-assets
          --out ${{ env.RENDER_OUTPUT_DIR }}
          --limit ${{ inputs.preview_limit }}

      - name: Enforce rendered creative quality
        run: >-
          node scripts/marketing/quality-gate-rendered-v3.mjs
          ${{ env.RENDER_OUTPUT_DIR }}/render-manifest-v3.json

      - name: Store review PNGs on the monthly branch
        id: review_commit
        shell: bash
        env:
          PERIOD_KEY: ${{ inputs.period_key }}
          CYCLE_BRANCH: ${{ github.ref_name }}
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -f -- "${RENDER_OUTPUT_DIR}"
          if git diff --cached --quiet; then
            echo "Rendered review assets are unchanged."
          else
            git commit -m "chore(marketing): stage review renders for ${PERIOD_KEY}"
            git push origin "HEAD:${CYCLE_BRANCH}"
          fi
          echo "commit_sha=$(git rev-parse HEAD)" >> "${GITHUB_OUTPUT}"

      - name: Build public review manifest
        if: ${{ inputs.preview_limit == '0' }}
        run: >-
          npm -w @innerbloom/api exec tsx scripts/create-marketing-github-staging-manifest.ts
          ../../marketing/generated/${{ inputs.period_key }}/rendered
          ../../marketing/generated/${{ inputs.period_key }}/review-staging-manifest.json
          ${{ github.repository }}
          ${{ steps.review_commit.outputs.commit_sha }}

      - name: Import campaign into Admin review
        if: ${{ inputs.preview_limit == '0' }}
        run: >-
          npm -w @innerbloom/api exec tsx scripts/import-marketing-campaign.ts
          ../../marketing/agent-outputs/${{ inputs.period_key }}/campaign.json
          ../../marketing/generated/${{ inputs.period_key }}/review-staging-manifest.json

      - name: Keep output as a build artifact
        if: ${{ always() }}
        uses: actions/upload-artifact@v4
        with:
          name: innerbloom-marketing-${{ inputs.period_key }}
          path: ${{ env.RENDER_OUTPUT_DIR }}
          retention-days: 30

      - name: Report next step
        run: |
          {
            echo "## Campaign ready for human review"
            echo "- Period: ${{ inputs.period_key }}"
            if [[ "${{ inputs.preview_limit }}" == "0" ]]; then
              echo "- Result: renderer v3 PNGs are staged and imported to Admin."
            else
              echo "- Result: renderer v3 pilot (${{ inputs.preview_limit }} jobs) is staged as an artifact; Admin was not changed."
            fi
            echo "- Next: open Admin > Marketing, approve or reject each post."
            echo "- After approval: use Upload approved assets to R2, then Download Metricool CSV."
          } >> "${GITHUB_STEP_SUMMARY}"
