name: Render campaign and send it to Admin

on:
  workflow_dispatch:
    inputs:
      period_key:
        description: Target campaign period in YYYY-MM format
        required: true
        type: string
      preview_limit:
        description: Preview N representative posts; 0 renders and imports the full campaign
        required: false
        default: "6"
        type: string

permissions:
  contents: read

concurrency:
  group: marketing-render-${{ inputs.period_key }}
  cancel-in-progress: false

jobs:
  render-and-import:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    env:
      DATABASE_URL: ${{ secrets.DATABASE_URL }}
      GOOGLE_SERVICE_ACCOUNT_JSON: ${{ secrets.GOOGLE_SERVICE_ACCOUNT_JSON }}
      R2_ACCOUNT_ID: ${{ secrets.R2_ACCOUNT_ID }}
      R2_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
      R2_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
      R2_BUCKET: ${{ secrets.R2_BUCKET }}
      R2_PUBLIC_BASE_URL: ${{ secrets.R2_PUBLIC_BASE_URL }}

    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.ref_name }}
          fetch-depth: 1

      - uses: actions/setup-node@v4
        with:
          node-version: 24

      - name: Check configuration
        run: |
          set -euo pipefail
          for key in DATABASE_URL GOOGLE_SERVICE_ACCOUNT_JSON R2_ACCOUNT_ID R2_ACCESS_KEY_ID R2_SECRET_ACCESS_KEY R2_BUCKET R2_PUBLIC_BASE_URL; do
            if [[ -z "${!key:-}" ]]; then
              echo "Missing required GitHub secret: ${key}" >&2
              exit 1
            fi
          done

      - name: Install dependencies
        run: npm install --no-audit --no-fund

      - name: Install Chromium for deterministic rendering
        run: npm -w @innerbloom/web exec playwright install --with-deps chromium

      - name: Prepare configured derived test campaign
        shell: bash
        run: |
          set -euo pipefail
          config="marketing/agent-outputs/${{ inputs.period_key }}/test-campaign.config.json"
          campaign="marketing/agent-outputs/${{ inputs.period_key }}/campaign.json"
          if [[ -f "${config}" ]]; then
            node scripts/marketing/create-derived-test-campaign.mjs "${config}" "${campaign}"
          fi
          if [[ ! -f "${campaign}" ]]; then
            echo "No campaign.json or test-campaign.config.json found for ${{ inputs.period_key }}" >&2
            exit 1
          fi

      - name: Choose isolated output
        shell: bash
        run: |
          if [[ "${{ inputs.preview_limit }}" == "0" ]]; then
            echo "RENDER_OUTPUT_DIR=marketing/generated/${{ inputs.period_key }}/rendered-${{ github.run_id }}" >> "${GITHUB_ENV}"
          else
            echo "RENDER_OUTPUT_DIR=marketing/generated/${{ inputs.period_key }}/pilot-${{ github.run_id }}" >> "${GITHUB_ENV}"
          fi

      - name: Validate semantic creative contract
        run: node scripts/marketing/validate-creative-direction-v3.mjs marketing/agent-outputs/${{ inputs.period_key }}/campaign.json

      - name: Stage approved screenshots and scenes
        run: >-
          npm -w @innerbloom/api exec tsx scripts/stage-marketing-drive-assets.ts
          ../../marketing/agent-outputs/${{ inputs.period_key }}/campaign.json
          ../../marketing/asset-registry/innerbloom-drive-assets-v1.json
          ../../marketing/generated/${{ inputs.period_key }}/source-assets-${{ github.run_id }}
          --include-reference-catalog

      - name: Compile references and render
        shell: bash
        run: |
          set -euo pipefail
          args=(
            marketing/agent-outputs/${{ inputs.period_key }}/campaign.json
            --asset-dir marketing/generated/${{ inputs.period_key }}/source-assets-${{ github.run_id }}
            --out "${RENDER_OUTPUT_DIR}"
            --layout-spec marketing/layout-references/innerbloom-layout-specifications-v1.json
          )
          if [[ "${{ inputs.preview_limit }}" != "0" ]]; then
            args+=(--post-limit "${{ inputs.preview_limit }}" --reference-pilot)
          fi
          node scripts/marketing/render-campaign-reference-v1.mjs "${args[@]}"

      - name: Enforce rendered quality
        run: node scripts/marketing/quality-gate-rendered-v3.mjs "${RENDER_OUTPUT_DIR}/render-manifest-v3.json"

      - name: Upload rendered image files directly to R2 and verify publicly
        run: >-
          node scripts/marketing/upload-rendered-assets-to-r2.mjs
          marketing/agent-outputs/${{ inputs.period_key }}/campaign.json
          "${RENDER_OUTPUT_DIR}"
          "${RENDER_OUTPUT_DIR}/r2-manifest.json"
          "${{ github.run_id }}"

      - name: Build inline Admin review manifest
        if: ${{ inputs.preview_limit == '0' }}
        run: >-
          npm -w @innerbloom/api exec tsx scripts/create-marketing-github-staging-manifest.ts
          ../../${{ env.RENDER_OUTPUT_DIR }}
          ../../marketing/generated/${{ inputs.period_key }}/review-staging-manifest-${{ github.run_id }}.json
          ${{ github.repository }}
          ${{ github.sha }}

      - name: Import campaign into Admin review
        if: ${{ inputs.preview_limit == '0' }}
        run: >-
          npm -w @innerbloom/api exec tsx scripts/import-marketing-campaign.ts
          ../../marketing/agent-outputs/${{ inputs.period_key }}/campaign.json
          ../../marketing/generated/${{ inputs.period_key }}/review-staging-manifest-${{ github.run_id }}.json

      - name: Keep output as artifact
        if: ${{ always() }}
        uses: actions/upload-artifact@v4
        with:
          name: innerbloom-marketing-${{ inputs.period_key }}-run-${{ github.run_id }}
          path: ${{ env.RENDER_OUTPUT_DIR }}
          retention-days: 30

      - name: Report next step
        run: |
          {
            echo "## Marketing campaign render complete"
            echo "- Period: ${{ inputs.period_key }}"
            echo "- Copy preserved from campaign.json"
            echo "- Real registered Innerbloom UI only"
            echo "- Rendered image bytes uploaded directly to versioned R2 keys"
            echo "- Every uploaded image verified publicly by MIME type, binary signature and SHA-256 checksum"
            echo "- R2 manifest: ${RENDER_OUTPUT_DIR}/r2-manifest.json"
            if [[ "${{ inputs.preview_limit }}" == "0" ]]; then
              echo "- Full campaign imported to Admin as needs_review using the current review transport"
            else
              echo "- Pilot only; Admin unchanged"
            fi
          } >> "${GITHUB_STEP_SUMMARY}"
