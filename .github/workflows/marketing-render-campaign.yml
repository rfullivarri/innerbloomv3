name: Render campaign and send it to Admin

on:
  workflow_dispatch:
    inputs:
      period_key:
        description: Target campaign period in YYYY-MM format
        required: true
        type: string
      preview_limit:
        description: Preview N representative posts (one visual per post); 0 renders and imports the full campaign
        required: false
        default: "6"
        type: string

permissions:
  contents: write

concurrency:
  group: marketing-render-${{ inputs.period_key }}
  cancel-in-progress: false

jobs:
  render-and-import:
    runs-on: ubuntu-latest
    timeout-minutes: 40
    env:
      DATABASE_URL: ${{ secrets.DATABASE_URL }}
      GOOGLE_SERVICE_ACCOUNT_JSON: ${{ secrets.GOOGLE_SERVICE_ACCOUNT_JSON }}

    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.ref_name }}
          fetch-depth: 1

      - uses: actions/setup-node@v4
        with:
          node-version: 24

      - name: Check configuration
        run: |
          set -euo pipefail
          for key in DATABASE_URL GOOGLE_SERVICE_ACCOUNT_JSON; do
            if [[ -z "${!key:-}" ]]; then
              echo "Missing required GitHub secret: ${key}" >&2
              exit 1
            fi
          done

      - name: Install dependencies
        run: npm install --no-audit --no-fund

      - name: Install Chromium for the deterministic renderer
        run: npm -w @innerbloom/web exec playwright install --with-deps chromium

      - name: Choose clean isolated render output
        shell: bash
        run: |
          if [[ "${{ inputs.preview_limit }}" == "0" ]]; then
            echo "RENDER_OUTPUT_DIR=marketing/generated/${{ inputs.period_key }}/rendered" >> "${GITHUB_ENV}"
          else
            echo "RENDER_OUTPUT_DIR=marketing/generated/${{ inputs.period_key }}/renderer-v3-pilot-${{ github.run_id }}" >> "${GITHUB_ENV}"
          fi

      - name: Validate semantic creative contract
        run: node scripts/marketing/validate-creative-direction-v3.mjs marketing/agent-outputs/${{ inputs.period_key }}/campaign.json

      - name: Stage approved source assets and complete scene pack from Drive
        run: >-
          npm -w @innerbloom/api exec tsx scripts/stage-marketing-drive-assets.ts
          ../../marketing/agent-outputs/${{ inputs.period_key }}/campaign.json
          ../../marketing/asset-registry/innerbloom-drive-assets-v1.json
          ../../marketing/generated/${{ inputs.period_key }}/source-assets

      - name: Compile Layout Reference Pack v1 and render safely
        shell: bash
        run: |
          set -euo pipefail
          args=(
            marketing/agent-outputs/${{ inputs.period_key }}/campaign.json
            --asset-dir marketing/generated/${{ inputs.period_key }}/source-assets
            --out "${RENDER_OUTPUT_DIR}"
            --layout-spec marketing/layout-references/innerbloom-layout-specifications-v1.json
          )
          if [[ "${{ inputs.preview_limit }}" != "0" ]]; then
            args+=(--post-limit "${{ inputs.preview_limit }}" --pilot-scenes)
          fi
          node scripts/marketing/render-campaign-reference-v1.mjs "${args[@]}"

      - name: Enforce Phase 1 rendered creative quality
        run: >-
          node scripts/marketing/quality-gate-rendered-v3.mjs
          ${{ env.RENDER_OUTPUT_DIR }}/render-manifest-v3.json

      - name: Store review PNGs on the current marketing branch
        id: review_commit
        shell: bash
        env:
          PERIOD_KEY: ${{ inputs.period_key }}
          CYCLE_BRANCH: ${{ github.ref_name }}
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -f -- "${RENDER_OUTPUT_DIR}"
          if git diff --cached --quiet; then
            echo "Rendered review assets are unchanged."
          else
            git commit -m "chore(marketing): stage reference-driven review renders for ${PERIOD_KEY}"
            git push origin "HEAD:${CYCLE_BRANCH}"
          fi
          echo "commit_sha=$(git rev-parse HEAD)" >> "${GITHUB_OUTPUT}"

      - name: Build public review manifest
        if: ${{ inputs.preview_limit == '0' }}
        run: >-
          npm -w @innerbloom/api exec tsx scripts/create-marketing-github-staging-manifest.ts
          ../../marketing/generated/${{ inputs.period_key }}/rendered
          ../../marketing/generated/${{ inputs.period_key }}/review-staging-manifest.json
          ${{ github.repository }}
          ${{ steps.review_commit.outputs.commit_sha }}

      - name: Import campaign into Admin review
        if: ${{ inputs.preview_limit == '0' }}
        run: >-
          npm -w @innerbloom/api exec tsx scripts/import-marketing-campaign.ts
          ../../marketing/agent-outputs/${{ inputs.period_key }}/campaign.json
          ../../marketing/generated/${{ inputs.period_key }}/review-staging-manifest.json

      - name: Keep output as a build artifact
        if: ${{ always() }}
        uses: actions/upload-artifact@v4
        with:
          name: innerbloom-marketing-${{ inputs.period_key }}-run-${{ github.run_id }}
          path: ${{ env.RENDER_OUTPUT_DIR }}
          retention-days: 30

      - name: Report next step
        run: |
          {
            echo "## Reference-driven campaign ready for human review"
            echo "- Period: ${{ inputs.period_key }}"
            echo "- Copy: preserved exactly from campaign.json"
            echo "- UI: registered real Innerbloom screenshots only"
            echo "- Layouts: compiled from Layout Reference Pack v1 specifications"
            echo "- Composition: renderer retries safe fallbacks to prevent collisions"
            if [[ "${{ inputs.preview_limit }}" == "0" ]]; then
              echo "- Result: full campaign rendered and imported to Admin."
            else
              echo "- Result: exactly ${{ inputs.preview_limit }} representative post visuals rendered; one visual per post."
              echo "- Scene pack: the first four eligible posts rotate the four approved AI backgrounds."
              echo "- Artifact includes layout-reference-plan-v1.json for traceability."
              echo "- Admin: unchanged."
            fi
          } >> "${GITHUB_STEP_SUMMARY}"
