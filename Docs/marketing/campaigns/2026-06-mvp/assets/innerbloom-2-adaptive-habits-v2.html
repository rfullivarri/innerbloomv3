<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Innerbloom 2.0 Adaptive Habits</title>
    <style>
      :root {
        --ink: #151326;
        --muted: #5d5578;
        --purple: #7652f0;
        --green: #277d70;
        --rose: #ed698b;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
        background: #f7f1ea;
        font-family: Arial, Helvetica, sans-serif;
      }

      .poster {
        position: relative;
        width: 1080px;
        height: 1080px;
        overflow: hidden;
        background:
          radial-gradient(circle at 86% 18%, rgba(198, 185, 255, 0.52), transparent 40%),
          radial-gradient(circle at 78% 84%, rgba(255, 209, 220, 0.42), transparent 34%),
          linear-gradient(135deg, #fbf7ed 0%, #f6ebe5 54%, #eadff1 100%);
        color: var(--ink);
      }

      .poster::before {
        content: "";
        position: absolute;
        inset: 22px;
        border: 2px solid rgba(255, 255, 255, 0.64);
        border-radius: 46px;
        pointer-events: none;
      }

      .brand {
        position: absolute;
        top: 58px;
        left: 72px;
        display: flex;
        align-items: center;
        gap: 17px;
        letter-spacing: 9px;
        font-size: 28px;
        font-weight: 800;
      }

      .brand img {
        width: 42px;
        height: 42px;
        object-fit: contain;
      }

      .badge {
        position: absolute;
        top: 218px;
        left: 72px;
        padding: 9px 21px 8px;
        border: 1px solid rgba(118, 82, 240, 0.25);
        border-radius: 999px;
        background: rgba(255, 255, 255, 0.52);
        color: var(--purple);
        font-size: 27px;
        font-weight: 800;
      }

      h1 {
        position: absolute;
        top: 286px;
        left: 72px;
        width: 720px;
        margin: 0;
        font-size: 74px;
        line-height: 0.98;
        letter-spacing: 0;
      }

      .subhead {
        position: absolute;
        top: 478px;
        left: 76px;
        width: 560px;
        margin: 0;
        color: var(--muted);
        font-size: 36px;
        line-height: 1.22;
      }

      .chips {
        position: absolute;
        top: 610px;
        left: 76px;
        display: flex;
        gap: 15px;
        flex-wrap: wrap;
        width: 580px;
      }

      .chip {
        display: inline-flex;
        align-items: center;
        gap: 11px;
        height: 42px;
        padding: 0 17px 0 15px;
        border: 1px solid rgba(118, 82, 240, 0.16);
        border-radius: 999px;
        background: rgba(255, 255, 255, 0.55);
        color: #343047;
        font-size: 21px;
        font-weight: 700;
      }

      .chip::before {
        content: "";
        width: 10px;
        height: 10px;
        border-radius: 50%;
        background: var(--dot);
      }

      .board {
        position: absolute;
        right: 60px;
        bottom: 73px;
        width: 470px;
        height: 300px;
        border-radius: 42px;
        object-fit: cover;
        opacity: 0.7;
        filter: saturate(0.98) contrast(0.97);
        box-shadow: 0 30px 90px rgba(72, 56, 92, 0.18);
      }

      .phone-wrap {
        position: absolute;
        top: 205px;
        right: 40px;
        width: 390px;
        height: 825px;
        transform: rotate(-6deg);
        transform-origin: 50% 50%;
        filter: drop-shadow(18px 34px 38px rgba(32, 26, 45, 0.25));
      }

      .phone {
        width: 100%;
        height: 100%;
        padding: 14px;
        border: 2px solid rgba(255, 255, 255, 0.42);
        border-radius: 54px;
        background: #0d1224;
        overflow: hidden;
      }

      .phone img {
        width: 100%;
        height: 100%;
        border-radius: 40px;
        object-fit: cover;
        object-position: top center;
        display: block;
      }

      .cta {
        position: absolute;
        left: 76px;
        bottom: 186px;
        display: inline-flex;
        align-items: center;
        height: 54px;
        padding: 0 28px;
        border-radius: 999px;
        background: #19162d;
        color: white;
        font-size: 23px;
        font-weight: 800;
      }

      .footer {
        position: absolute;
        left: 76px;
        bottom: 110px;
        margin: 0;
        color: rgba(81, 72, 103, 0.92);
        font-size: 28px;
        line-height: 1.2;
      }

      .flower-watermark {
        position: absolute;
        right: -34px;
        bottom: -32px;
        width: 335px;
        opacity: 0.1;
      }
    </style>
  </head>
  <body>
    <main class="poster">
      <div class="brand">
        <img src="../../../../../apps/web/public/brand/innerbloom-2/flower-transparent.png" alt="" />
        <span>INNERBLOOM</span>
      </div>
      <div class="badge">INNERBLOOM 2.0</div>
      <h1>Your habits should adapt to your real life.</h1>
      <p class="subhead">Adaptive habits for real weeks, not perfect calendars.</p>
      <div class="chips" aria-hidden="true">
        <span class="chip" style="--dot: var(--purple)">Daily check-ins</span>
        <span class="chip" style="--dot: var(--green)">Real-life rhythm</span>
        <span class="chip" style="--dot: var(--rose)">Flexible streaks</span>
      </div>
      <img class="board" src="../../../../../apps/web/public/landing-v2/method/step-01-real-life-board.jpg" alt="" />
      <div class="phone-wrap">
        <div class="phone">
          <img src="../../../../../Docs/play-store-assets/phone-screenshots/04-daily-quest.jpg" alt="" />
        </div>
      </div>
      <div class="cta">Built for adaptive weeks</div>
      <p class="footer">When life changes, your plan recalibrates.</p>
      <img class="flower-watermark" src="../../../../../apps/web/public/brand/innerbloom-2/flower-transparent.png" alt="" />
    </main>
  </body>
</html>
